name: Staging Deployment Pipeline

on:
  push:
    branches: [ "staging" ]
  pull_request:
    branches: [ "staging" ]

jobs:
  staging-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Install libvirt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvirt-dev \
            libvirt-daemon \
            pkg-config
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Run tests
        run: go test ./... -v

  staging-build-image:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: staging-test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/billing-service:staging

  staging-deploy:
    needs: staging-build-image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Staging via SSH over Tailscale.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker network create aws-staging-network || true
            docker pull qarani/llm-inference-service-go:staging
            docker stop llm-inference-service-staging || true
            docker rm llm-inference-service-staging || true
            docker run -d --name llm-gateway-staging \
            --network aws-staging-network \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -p 8891:8891 \
            -e APP_ENV=staging \
            -e APP_PROFILE=staging \
            -e SERVER_PORT=:8891 \
            -e SERVICE_PORT=8891 \
            -e SERVICE_NAME=llm-gateway \
            -e EUREKA_APP_NAME=llm-gateway \
            -e EUREKA_VIP_ADDRESS=llm-gateway \
            -e EUREKA_HOSTNAME=llm-gateway-staging \
            -e EUREKA_INSTANCE_ID=llm-gateway-staging:8891 \
            -e EUREKA_SERVER_URL=http://discovery-server-staging:8761/eureka \
            -e NATS_URL=nats://nats-staging:4222 \
            -e NATS_USER=nats-staging-user \
            -e NATS_PASSWORD=nats-staging-password \
            -e NATS_PREFIX=staging.v1 \
            -e DB_HOST=postgres-staging \
            -e DB_PORT=5432 \
            -e DB_USER=postgres-staging-user \
            -e DB_PASSWORD=postgres-staging-password \
            -e DB_NAME=llm_db \
            -e DOCS_PATH=/app/docs \
            -e AWS_REGION=eu-north-1 \
            qarani/llm-inference-service-go:staging

  staging-open-pr-to-main:
    needs: staging-deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR staging → main
        run: |
          if gh pr list --base main --head staging --state open --json number | jq -e 'length > 0' > /dev/null; then
            echo "PR already exists. Skipping..."
          else
            gh pr create \
              --base main \
              --head staging \
              --title "chore: promote staging → main" \
              --body "✅ Staging deployment succeeded. Auto-generated PR for production release."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

