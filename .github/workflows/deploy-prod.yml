name: Prod deployment Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
permissions:
  contents: write 
  pull-requests: write

jobs:
  prod-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Install libvirt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvirt-dev \
            libvirt-daemon \
            pkg-config
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Run tests
        run: go test ./... -v

  prod-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: prod-test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/llm-gateway:prod

  prod-deploy:
    needs: prod-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Staging via SSH over Tailscale.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker network create --attachable --driver overlay aws-prod-network || true
            docker pull qarani/llm-gateway:prod
            docker service rm llm-gateway || true
            docker service create \
            --name llm-gateway \
            --network aws-prod-network \
            --publish published=8805,target=8805 \
            --mount type=bind,src=/var/run/docker.sock,dst=/var/run/docker.sock \
            --env APP_PROFILE=prod \
            --env EUREKA_HOSTNAME=llm-gateway-prod \
            --env EUREKA_IP_ADDR=127.0.0.1 \
            --env SERVICE_PORT=8891 \
            --env SERVER_PORT=8891 \
            --env NATS_PREFIX=prod.v1 \
            --env DOCS_PATH=/app/docs \
            --env DB_HOST=postgres-prod \
            --env DB_PORT=5432 \
            --env DB_USER=postgres-prod-user \
            --env DB_PASSWORD=postgres-prod-password \
            --env DB_NAME=llm_db \
            --env NATS_URL=nats://nats-prod:4222 \
            --env NATS_USER=nats-prod-user \
            --env NATS_PASSWORD=nats-prod-password \
            --env EUREKA_SERVER_URL=http://discovery-server-prod:8761/eureka \
            --env PUBLIC_HOST_IP=192.168.1.7 \
            --env AWS_REGION=eu-north-1 \
            qarani/llm-gateway:prod


