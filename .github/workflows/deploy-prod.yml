name: Prod deployment Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  prod-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Install libvirt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvirt-dev \
            libvirt-daemon \
            pkg-config
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Run tests
        run: go test ./... -v

  prod-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: prod-test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/llm-gateway:prod

  prod-deploy:
    needs: prod-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          passphrase: ${{ secrets.PROD_SSH_PASSPHRASE }}
          script: |
            docker network create aws-prod-network || true
            docker pull qarani/llm-gateway:prod
            docker stop llm-gateway-prod || true
            docker rm llm-gateway-prod || true
            docker run -d \
              --name llm-gateway-prod \
              --network aws-prod-network \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -p 8805:8805 \
              -e APP_PROFILE=STAGING \
              -e EUREKA_HOSTNAME=rds-server-prod \
              -e EUREKA_IP_ADDR=127.0.0.1 \
              -e RDS_PORT=8805 \
              -e DB_HOST=postgres-prod \
              -e DB_PORT=5432 \
              -e DB_USER=postgres-prod-user \
              -e DB_PASSWORD=postgres-prod-password \
              -e DB_NAME=rds_db \
              -e NATS_URL=nats://nats-prod:4222 \
              -e NATS_USERNAME=nats-prod-user \
              -e NATS_PASSWORD=nats-prod-password \
              -e EUREKA_SERVER_URL=http://discovery-server-prod:8761/eureka \
              -e PUBLIC_HOST_IP=192.168.1.7 \
              -e AWS_REGION=eu-north-1 \
              qarani/rds-server:prod




